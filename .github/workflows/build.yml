name: Build Syncroboxter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - uses: android-actions/setup-android@v3
      - name: Descargar Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Compilar APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Syncroboxter-Android-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30